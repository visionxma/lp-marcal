function initSlideToGoal(onDone){
  const track = document.getElementById('stg-track');
  const handleWrap = document.getElementById('stg-handle-wrap');
  const handle = document.getElementById('stg-handle');
  const halo = document.getElementById('stg-halo');
  const labelEl = document.getElementById('stg-label');
  const goalEl = document.getElementById('stg-goal');
  const tip = document.getElementById('stg-tip');
  const confetti = document.getElementById('stg-confetti');
  const shimmer = document.getElementById('stg-shimmer-wrap');
  const HANDLE=48, PAD=4;
  let maxX=0,x=0,dragging=false,done=false,touched=false;
  const update=()=>{ maxX = track.clientWidth - HANDLE - PAD*2; };
  update();
  window.addEventListener('resize',update);

  function setX(v){ x = Math.max(0, Math.min(maxX, v)); handleWrap.style.left = (x+PAD)+'px'; handle.style.transform = `rotate(${x*5}deg)`; }
  function finish(){
    if(done) return;
    done=true; setX(maxX);
    labelEl.classList.add('hidden'); shimmer.classList.add('hidden');
    halo.style.display='none';
    handle.style.animation='none'; handle.style.transform='rotate(0) scale(.95)';
    document.getElementById('stg-handle-icon').outerHTML = '<i data-lucide="check" class="text-primary" style="width:24px;height:24px;animation:checkPop .4s cubic-bezier(0.34,1.56,0.64,1) forwards" stroke-width="3"></i>';
    lucide.createIcons();
    goalEl.classList.remove('hidden'); goalEl.classList.add('flex');
    confetti.classList.remove('hidden');
    const colors=['#fff','hsl(42 85% 60%)','hsl(48 100% 60%)','hsl(0 85% 60%)','hsl(200 90% 60%)'];
    for(let i=0;i<16;i++){
      const dx=(Math.random()-.5)*220, dy=-(30+Math.random()*70), rot=Math.random()*720-360, delay=Math.random()*.15, left=50+(Math.random()-.5)*60;
      const s=document.createElement('span');
      s.className='absolute h-2 w-1.5 rounded-[1px]';
      s.style.cssText=`left:${left}%;top:50%;background:${colors[i%colors.length]};animation:confettiPop 1s ease-out ${delay}s forwards;--cx:${dx}px;--cy:${dy}px;--cr:${rot}deg`;
      confetti.appendChild(s);
    }
    tip.textContent='Acesso liberado, redirecionando…';
    setTimeout(onDone, 1400);
  }
  handle.addEventListener('pointerdown',e=>{ if(done) return; dragging=true; touched=true; halo.style.display='none'; handle.style.animation='none'; handle.setPointerCapture(e.pointerId); });
  handle.addEventListener('pointermove',e=>{
    if(!dragging||done) return;
    const r=track.getBoundingClientRect();
    handleWrap.style.transition='none';
    setX(e.clientX - r.left - HANDLE/2);
    if(x>=maxX-2){ dragging=false; finish(); }
  });
  const up=()=>{ if(done) return; dragging=false; handleWrap.style.transition='left .3s ease-out'; if(maxX>0 && x/maxX>=0.4) finish(); else setX(0); };
  handle.addEventListener('pointerup',up); handle.addEventListener('pointercancel',up);
  track.addEventListener('click',()=>{ if(done||dragging) return; if(x<=2){ touched=true; halo.style.display='none'; handle.style.animation='none'; handleWrap.style.transition='left .28s cubic-bezier(0.5,0,0.75,0)'; setX(maxX); setTimeout(finish,280); } });
}

/* ----- QUIZ STEP ----- */
function questionNumberOf(idx){
  let c=0; for(let i=0;i<=idx;i++){ if(STEPS[i].kind==='question') c++; } return c;
}
function personalize(qid){
  const q = JSON.parse(JSON.stringify(QUESTIONS[qid]));
  const a = state.answers;
  if(q.id==='betType' && a.league && LEAGUE_SUBLBL[a.league]){
    q.subtitle = `Vamos te encaixar no fluxo certo de entradas ${LEAGUE_SUBLBL[a.league]}.`;
  }
  if(q.id==='result' && a.experience){ q.subtitle = EXP_HOOK[a.experience] || q.subtitle; }
  if(q.id==='style' && a.result){ q.subtitle = RESULT_HOOK[a.result] || q.subtitle; }
  return q;
}

            </button>` : `<div class="h-9 w-9"></div>`}
          <div class="flex-1">

            </div>
            <div class="relative h-1.5 w-full overflow-hidden rounded-full bg-muted">
              <div class="relative h-full rounded-full bg-gradient-primary transition-all duration-500" style="width:${pct}%">
                <div class="absolute inset-0 rounded-full opacity-50" style="background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent); animation:progress-shine 2.2s linear infinite"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="animate-slide-up">
          <h2 class="font-display text-[26px] font-bold leading-tight sm:text-[30px]">${q.title}</h2>
          ${q.subtitle?`<p class="mt-2 text-[14px] leading-relaxed text-mutedfg sm:text-[15px]">${q.subtitle}</p>`:''}
          <div class="mt-6 space-y-2.5" id="optsWrap">
            ${q.options.map(opt=>`
              <button data-opt="${opt.id}" class="opt group relative flex w-full items-center gap-3.5 overflow-hidden rounded-xl border border-border bg-card p-3.5 text-left transition-all duration-200 hover:border-primary/60 hover:bg-secondary/60 active:scale-[.99]">

                  <i data-lucide="${opt.icon}" class="icon-md" stroke-width="2"></i>
                </div>
                <div class="min-w-0 flex-1">
                  <div class="text-[15px] font-semibold leading-snug text-fg">${opt.label}</div>
                  ${opt.description?`<div class="mt-0.5 text-[12.5px] leading-snug text-mutedfg">${opt.description}</div>`:''}
                </div>
                <div class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full border-2 border-border bg-transparent text-transparent transition-all opt-check">
                  <i data-lucide="check" class="icon-sm" stroke-width="3"></i>
                </div>
              </button>`).join('')}
          </div>
        </div>
        <p class="mt-7 text-center text-[11px] text-mutedfg">Toque pra selecionar — avançamos automaticamente</p>
      </div>
    </div>`;
  }
  return renderInterstitial();
}

function renderInterstitial(){
  return `

          </div>
          <div class="mt-1.5 relative h-2 w-full overflow-hidden rounded-full bg-muted">
            <div id="an-bar" class="h-full rounded-full bg-gradient-primary transition-all duration-500" style="width:0%"></div>
          </div>
        </div>
        <ul class="mt-6 space-y-3.5" id="an-list">
          ${ANALYZE_STEPS.map((s,i)=>`
            <li data-i="${i}" class="flex items-center gap-3 text-[14px] transition-all opacity-35">
              <div class="step-dot flex h-5 w-5 shrink-0 items-center justify-center rounded-full border border-border text-transparent transition-all">
                <i data-lucide="check" style="width:12px;height:12px" stroke-width="3"></i>
              </div>
              <span class="step-label leading-snug text-mutedfg">${s}</span>
            </li>`).join('')}
        </ul>
      </div>
    </div>
  </div>`;
}

function runAnalyzing(){
  let i = 0; const total = ANALYZE_STEPS.length;
  if(total===0){ state.stage='result'; render(); return; }
  const tick = ()=>{
    const pct = Math.round(((i+1)/total)*100);
    document.getElementById('an-pct').textContent = pct+'%';
    document.getElementById('an-bar').style.width = pct+'%';
    document.querySelectorAll('#an-list li').forEach((li,idx)=>{
      const done = idx<=i, current = idx===i;
      li.classList.toggle('opacity-35', !done && !current);
      const dot = li.querySelector('.step-dot');
      const label = li.querySelector('.step-label');
      if(done){ dot.style.background='hsl(148 78% 48%)'; dot.style.borderColor='hsl(148 78% 48%)'; dot.style.color='#fff'; label.classList.remove('text-mutedfg'); label.classList.add('text-fg','font-medium'); }
      else if(current){ dot.style.borderColor='hsl(148 78% 48%)'; dot.style.color='hsl(148 78% 48%)'; dot.style.background='hsl(52 100% 58% / .15)'; label.classList.remove('text-mutedfg'); label.classList.add('text-fg','font-medium'); }
    });
    if(i>=total-1){ setTimeout(()=>{ state.stage='result'; render(); }, 300); return; }
    i++; setTimeout(tick, 650);
  };
  tick();
}

/* ===================== BIND ===================== */
function bind(){
  if(state.stage==='intro'){
    initSlideToGoal(()=>{ state.stage='quiz'; state.stepIndex=0; render(); });
  }
  if(state.stage==='quiz'){
    const step = STEPS[state.stepIndex];
    if(step.kind==='question'){
      const back = document.getElementById('qBack');
      if(back) back.onclick = ()=>{ if(state.stepIndex>0){ state.stepIndex--; render(); } };
      let chosen=null;
      document.querySelectorAll('.opt').forEach(btn=>{
        btn.onclick = ()=>{
          if(chosen) return;
          chosen = btn.dataset.opt;
          document.querySelectorAll('.opt').forEach(b=>{
            if(b===btn){
              b.classList.add('border-primary','bg-secondary/80');
              b.querySelector('.opt-icon').classList.remove('border-border','bg-secondary/60','text-mutedfg');
              b.querySelector('.opt-icon').classList.add('border-primary/40','bg-primary/15','text-primary');
              const c = b.querySelector('.opt-check');
              c.classList.remove('border-border','text-transparent','bg-transparent');
              c.classList.add('border-primary','bg-primary','text-primaryfg');
            } else {
              b.classList.add('opacity-40');
            }
            b.disabled = true;
          });
          setTimeout(()=>{
            state.answers[step.q] = chosen;
            if(state.stepIndex+1>=STEPS.length){ state.stage='analyzing'; render(); runAnalyzing(); }
            else { state.stepIndex++; render(); }
          }, 320);
        };
      });
    } else {
      // interstitial sliders
      setupSlider('prints', 3);
      setupSlider('bil', 3);
      document.getElementById('interCta').onclick = ()=>{ state.stepIndex++; render(); };
    }
  }
  if(state.stage==='analyzing'){ /* started in render trigger */ }
  if(state.stage==='result'){
    const cta = document.getElementById('resultCta');
    const sticky = document.getElementById('stickyCta');
    const stickyBtn = document.getElementById('stickyBtn');
    cta.onclick = openLeadModal;
    stickyBtn.onclick = openLeadModal;
    const io = new IntersectionObserver(([e])=>{
      const visible = !e.isIntersecting || e.intersectionRatio<0.4;
      sticky.classList.toggle('translate-y-4', !visible);
      sticky.classList.toggle('opacity-0', !visible);
      sticky.classList.toggle('opacity-100', visible);
      sticky.classList.toggle('pointer-events-auto', visible);
    }, {threshold:[0,0.4,1]});
    io.observe(cta);
    setInterval(()=>{
      const mm = String(Math.floor(cdSeconds/60)).padStart(2,'0');
      const ss = String(cdSeconds%60).padStart(2,'0');
      const a = document.getElementById('r-mm-s'); const b = document.getElementById('r-ss-s');
      if(a) a.textContent = mm; if(b) b.textContent = ss;
    }, 1000);
  }
}

function formatPhone(v){
  const d = v.replace(/\D/g,'').slice(0,11);
  if(d.length<=2) return d.length?`(${d}`:'';
  if(d.length<=7) return `(${d.slice(0,2)}) ${d.slice(2)}`;
  return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
}

        <button id="lmSubmit" type="submit" class="mt-2 h-14 w-full inline-flex items-center justify-center gap-2 rounded-2xl text-[16px] font-extrabold uppercase tracking-wide text-white hover:opacity-95 disabled:opacity-60 transition shadow-lg" style="background:#22C55E; box-shadow:0 10px 30px -10px rgba(34,197,94,.55)">
          <span id="lmBtnLabel">Garantir minha vaga</span>
        </button>
        <p class="text-center text-[12px]" style="color:rgba(255,255,255,.45)">Ao continuar você confirma ter 18 anos ou mais.</p>
      </form>
    </div>`;
  document.body.appendChild(wrap);
  lucide.createIcons();
  const close = ()=>{ wrap.remove(); };
  wrap.addEventListener('click', e=>{ if(e.target===wrap) close(); });
  document.getElementById('lmClose').onclick = close;
  const phoneEl = document.getElementById('lmPhone');
  phoneEl.addEventListener('input', e=>{ e.target.value = formatPhone(e.target.value); });
  document.getElementById('lmForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const errEl = document.getElementById('lmErr');
    const btn = document.getElementById('lmSubmit');
    const label = document.getElementById('lmBtnLabel');
    errEl.classList.add('hidden');
    const phoneDigits = phoneEl.value.replace(/\D/g,'');
    const email = document.getElementById('lmEmail').value.trim();
    if(phoneDigits.length<10){ errEl.textContent='Informe um WhatsApp válido com DDD.'; errEl.classList.remove('hidden'); return; }
    if(email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ errEl.textContent='E-mail inválido.'; errEl.classList.remove('hidden'); return; }
    btn.disabled = true; label.textContent='Enviando...';
    const lead = { telefone: phoneDigits };
    if(email) lead.email = email;
    const respostas = {};
    Object.entries(state.answers).forEach(([k,v])=>{ if(v) respostas[k]=v; });
    const utms = getUtms();
    const payload = {
      lead,
      token: CONFIG.LEAD_TOKEN,
      origem: CONFIG.ORIGEM,
      event: 'novo_lead_quiz',
      timestamp: new Date().toISOString(),
    };
    if(Object.keys(respostas).length) payload.respostas = respostas;
    if(Object.keys(utms).length) payload.utm_params = utms;
    try { localStorage.setItem('joaomarcal_lead_'+Date.now(), JSON.stringify(payload)); } catch(_){}
    if(CONFIG.LEAD_ENDPOINT){
      try {
        fetch(CONFIG.LEAD_ENDPOINT, {
          method:'POST',
          mode:'no-cors',
          headers:{'Content-Type':'text/plain;charset=utf-8'},
          body: JSON.stringify(payload),
          keepalive: true,
        }).catch(function(){});
      } catch(err){ console.warn('lead endpoint error', err); }
    }
    try {
      if(window.fbq && CONFIG.FB_PIXEL_ID){
        window.fbq('trackSingle',CONFIG.FB_PIXEL_ID,'Lead',{content_name:'João Marçal — Grupo VIP'});
      }
    } catch(_){}
    window.location.href = REDIRECT_URL;
  });
}

function setupSlider(prefix, count){
  let i = 0;
  const track = document.getElementById(prefix+'-track');
  const dots = document.getElementById(prefix+'-dots');
  dots.innerHTML = Array.from({length:count}).map((_,k)=>`<button data-i="${k}" class="${k===0?'w-6 bg-primary':'w-1.5 bg-border'} h-1.5 rounded-full transition-all"></button>`).join('');
  const update = ()=>{
    track.style.transform = `translateX(-${i*100}%)`;
    dots.querySelectorAll('button').forEach((d,k)=>{
      d.className = `${k===i?'w-6 bg-primary':'w-1.5 bg-border'} h-1.5 rounded-full transition-all`;
    });
  };
  document.getElementById(prefix+'Prev').onclick = ()=>{ i=(i-1+count)%count; update(); };
  document.getElementById(prefix+'Next').onclick = ()=>{ i=(i+1)%count; update(); };
  dots.querySelectorAll('button').forEach(d=>d.onclick=()=>{ i=parseInt(d.dataset.i); update(); });
  setInterval(()=>{ i=(i+1)%count; update(); }, prefix==='bil'?3500:4200);
}
